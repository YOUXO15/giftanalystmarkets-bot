databases:
  - name: giftanalystmarkets-db
    databaseName: gift_analytics
    user: gift_analytics_user

services:
  - type: worker
    name: giftanalystmarkets-bot
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade head
    startCommand: python -m src.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: BOT_TOKEN
        sync: false
      - key: BOT_POLLING_TIMEOUT
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: giftanalystmarkets-db
          property: connectionString
      - key: DATABASE_ECHO
        value: false
      - key: GIFT_ANALYST_MARKETS_BASE_URL
        sync: false
      - key: GIFT_ANALYST_MARKETS_API_KEY
        sync: false
      - key: GIFT_ANALYST_MARKETS_USE_MOCK_DATA
        value: false
      - key: TON_API_BASE_URL
        value: https://tonapi.io
      - key: TON_API_KEY
        sync: false
      - key: CRYPTO_PAY_BASE_URL
        value: https://pay.crypt.bot
      - key: CRYPTO_PAY_API_TOKEN
        sync: false
      - key: CRYPTO_PAY_ASSET
        value: TON
      - key: CRYPTO_PAY_INVOICE_EXPIRES_IN
        value: 3600
      - key: SUBSCRIPTION_INTRO_PRICE_TON
        value: 0.1
      - key: SUBSCRIPTION_MONTHLY_PRICE_TON
        value: 3
      - key: SUBSCRIPTION_PERIOD_DAYS
        value: 30
      - key: DAILY_EXPORT_LIMIT
        value: 25
      - key: BUSINESS_TIMEZONE
        value: Europe/Moscow
      - key: HTTP_TIMEOUT_SECONDS
        value: 15
